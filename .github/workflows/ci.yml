name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Typecheck, lint, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run format:check
      - run: npm test
      - name: Build
        run: npm run build
        env:
          # Dummy public values so the build never depends on real secrets.
          NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-anon-key

  database:
    name: Migrations + RLS access tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Start local Supabase (throwaway DB)
        run: supabase start
      - name: Apply all migrations + seed from scratch
        run: supabase db reset
      - name: Run RLS access-boundary tests against the live DB
        run: |
          set -a
          eval "$(supabase status -o env \
            --override-name api.url=SUPABASE_URL \
            --override-name auth.anon_key=SUPABASE_ANON_KEY \
            --override-name auth.service_role_key=SUPABASE_SERVICE_ROLE_KEY \
            --override-name db.url=DB_URL)"
          set +a
          npm run test:rls
      - name: Stop
        if: always()
        run: supabase stop

  e2e:
    name: Browser e2e (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Start local Supabase + apply migrations
        run: |
          supabase start
          supabase db reset
      - name: Install Playwright chromium
        run: npx playwright install --with-deps chromium
      - name: Run e2e against the app + live Supabase
        run: |
          set -a
          eval "$(supabase status -o env \
            --override-name api.url=SUPABASE_URL \
            --override-name auth.anon_key=SUPABASE_ANON_KEY \
            --override-name auth.service_role_key=SUPABASE_SERVICE_ROLE_KEY)"
          export NEXT_PUBLIC_SUPABASE_URL="$SUPABASE_URL"
          export NEXT_PUBLIC_SUPABASE_ANON_KEY="$SUPABASE_ANON_KEY"
          set +a
          npx playwright test --project=chromium
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
      - name: Stop
        if: always()
        run: supabase stop
